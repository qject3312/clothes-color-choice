services:
  fastapi:
    build: .
    command: python -m uvicorn backend.app:app --host 0.0.0.0 --port 8000
    environment:
      FITPICK_DB_PATH: /fitpick-data/clothes.db
    ports:
      - "8000:8000"
    volumes:
      - .:/fitpick-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8001
    environment:
      FITPICK_DB_PATH: /fitpick-data/clothes.db
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,django
    ports:
      - "8001:8001"
    volumes:
      - .:/fitpick-data
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
